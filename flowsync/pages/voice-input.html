<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlowSync - 语音添加任务</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #d97757;
      --brand-hover: #c46a4c;
      --dark: #1b1b19;
      --dark-mid: #262624;
      --card: #2c2c2b;
      --text: #faf9f5;
      --muted: #b7b5a9;
      --success: #8ca06f;
      --border: #908e84;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .phone-frame {
      width: 100%;
      max-width: 430px;
      position: relative;
      overflow-x: hidden;
    }

    /* Pulsing glow ring */
    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.2);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 0;
      }
    }

    .mic-glow {
      position: absolute;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--brand);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-ring 2s ease-out infinite;
      pointer-events: none;
    }

    .mic-glow-delay {
      animation-delay: 0.7s;
    }

    .mic-btn:active {
      transform: scale(0.92);
    }

    .cta-btn:active {
      transform: scale(0.97);
    }

    /* Android gesture bar */
    .gesture-bar {
      width: 134px;
      height: 5px;
      background: var(--muted);
      border-radius: 100px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="phone-frame">

    <!-- 1. Top Bar -->
    <div class="flex items-center justify-center relative px-5 pt-4 pb-2">
      <div data-dom-id="back-home" class="absolute left-5 top-4 w-9 h-9 flex items-center justify-center rounded-full cursor-pointer active:bg-white/10 transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--text)]">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </div>
      <span class="text-sm font-semibold text-[var(--text)]">添加任务</span>
    </div>

    <!-- 2. Concept Image -->
    <div class="px-5 mt-4">
      <div class="rounded-2xl overflow-hidden bg-[var(--card)]">
        <img src="../assets/android-voice-input.jpg" alt="语音输入概念" class="w-full h-auto object-cover" style="aspect-ratio: 16/9;">
      </div>
    </div>

    <!-- 3. Microphone Button -->
    <div class="flex flex-col items-center mt-10">
      <div class="relative">
        <div class="mic-glow"></div>
        <div class="mic-glow mic-glow-delay"></div>
        <button class="mic-btn relative w-24 h-24 rounded-full flex items-center justify-center cursor-pointer transition-transform duration-150" style="background: var(--brand); box-shadow: 0 8px 32px rgba(217,119,87,0.35);">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="11" rx="3" fill="white"></rect>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2" stroke-linecap="round"></path>
            <line x1="12" y1="17" x2="12" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"></line>
            <line x1="9" y1="20" x2="15" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"></line>
          </svg>
        </button>
      </div>
      <span class="text-sm mt-4" style="color: var(--muted);">按住说话</span>
    </div>

    <!-- 4. AI Parse Result Card -->
    <div class="px-5 mt-8">
      <div class="rounded-2xl p-5" style="background: var(--card);">

        <!-- 语音识别 -->
        <p class="text-xs mb-3" style="color: var(--muted);">语音识别</p>
        <p class="text-sm italic" style="color: var(--muted);">"明天要交方案，找小王要数据"</p>

        <!-- Divider -->
        <div class="mt-3 mb-3" style="border-top: 1px solid var(--border);"></div>

        <!-- AI 解析结果 -->
        <p class="text-xs font-semibold mb-3" style="color: var(--brand);">AI 解析结果</p>

        <!-- 任务标题 -->
        <div class="flex items-start justify-between mb-3">
          <span class="text-xs" style="color: var(--muted);">任务标题</span>
          <span class="text-sm font-semibold text-white">提交产品方案</span>
        </div>

        <!-- 截止时间 -->
        <div class="flex items-start justify-between mb-3">
          <span class="text-xs" style="color: var(--muted);">截止时间</span>
          <span class="text-sm font-medium" style="color: var(--brand);">明天 18:00</span>
        </div>

        <!-- 相关人 -->
        <div class="flex items-center justify-between">
          <span class="text-xs" style="color: var(--muted);">相关人</span>
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-semibold" style="background: var(--brand); color: white;">王</div>
            <span class="text-sm text-white">小王</span>
          </div>
        </div>

        <!-- 确认创建按钮 -->
        <button class="cta-btn w-full py-3.5 rounded-full text-sm font-semibold text-white cursor-pointer transition-transform duration-150 mt-5" style="background: var(--brand);" onmouseover="this.style.background='var(--brand-hover)'" onmouseout="this.style.background='var(--brand)'">
          确认创建
        </button>
      </div>
    </div>

    <!-- 5. Bottom Hint -->
    <div class="px-5 mt-4">
      <p class="text-xs text-center" style="color: rgba(183,181,169,0.6);">AI 会自动拆解为可执行的子任务</p>
    </div>

    <!-- Android Gesture Bar -->
    <div class="flex justify-center pb-8 pt-4">
      <div class="gesture-bar"></div>
    </div>

  </div>
</body>
</html>
