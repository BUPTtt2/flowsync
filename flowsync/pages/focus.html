<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlowSync - 专注模式</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #d97757;
      --brand-hover: #c46a4c;
      --dark: #1b1b19;
      --dark-mid: #262624;
      --card: #2c2c2b;
      --text: #faf9f5;
      --muted: #b7b5a9;
      --success: #8ca06f;
      --border: #908e84;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .phone-frame {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    /* Progress bar gradient */
    .progress-fill {
      background: linear-gradient(90deg, var(--brand), var(--brand-hover));
      transition: width 0.4s ease;
    }

    /* Subtask interactivity */
    .subtask-card {
      transition: transform 0.15s ease, background 0.2s ease;
      cursor: pointer;
    }
    .subtask-card:active {
      transform: scale(0.97);
    }

    /* CTA button */
    .cta-btn {
      transition: transform 0.15s ease, background 0.2s ease;
      cursor: pointer;
    }
    .cta-btn:active {
      transform: scale(0.97);
      background: var(--brand-hover);
    }

    /* Celebration overlay */
    .celebration-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(27, 27, 25, 0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .celebration-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes fade-up {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes check-pop {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .celebration-overlay.active .check-circle {
      animation: check-pop 0.5s ease forwards;
    }
    .celebration-overlay.active .check-ring {
      animation: pulse-ring 1.2s ease-out 0.3s infinite;
    }
    .celebration-overlay.active .celeb-title {
      animation: fade-up 0.45s ease 0.2s forwards;
      opacity: 0;
    }
    .celebration-overlay.active .celeb-sub {
      animation: fade-up 0.45s ease 0.35s forwards;
      opacity: 0;
    }
    .celebration-overlay.active .celeb-btn {
      animation: fade-up 0.45s ease 0.5s forwards;
      opacity: 0;
    }

    /* Gesture bar */
    .gesture-bar {
      width: 134px;
      height: 5px;
      border-radius: 100px;
      background: rgba(250, 249, 245, 0.25);
      margin: 8px auto 6px;
    }

    /* Completed subtask line-through */
    .subtask-done .subtask-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .subtask-done .subtask-check {
      background: var(--success);
    }
    .subtask-pending .subtask-check {
      border: 2px solid var(--muted);
      background: transparent;
    }

    /* Image card shadow */
    .concept-img-card {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>
  <div class="phone-frame">

    <!-- Minimal Top Bar -->
    <div class="flex items-center justify-between px-5 pt-4 pb-2">
      <a href="home.html" data-dom-id="back-home" class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--card);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#faf9f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <span class="text-sm" style="color: var(--muted);">方案初稿</span>
      <div class="w-9 h-9 flex items-center justify-center rounded-full" style="background: var(--card);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#faf9f5">
          <circle cx="5" cy="12" r="2"></circle>
          <circle cx="12" cy="12" r="2"></circle>
          <circle cx="19" cy="12" r="2"></circle>
        </svg>
      </div>
    </div>

    <!-- Concept Image -->
    <div class="px-5 mt-4">
      <div class="concept-img-card rounded-2xl overflow-hidden">
        <img src="../assets/android-focus.jpg" alt="专注模式概念图" class="w-full h-auto object-cover" style="aspect-ratio: 16/10;">
      </div>
    </div>

    <!-- Task Content Area -->
    <div class="px-5 mt-8">
      <h1 class="text-2xl font-bold" style="color: var(--text);">完成产品方案初稿</h1>
      <p class="text-sm mt-2" style="color: var(--brand);">今天 18:00 截止</p>
      <div class="mt-3 inline-flex items-center px-3 py-1 rounded-full text-xs font-medium" style="background: rgba(217, 119, 87, 0.15); color: var(--brand);">
        <svg class="mr-1" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
        高优先级
      </div>
    </div>

    <!-- Progress Section -->
    <div class="px-5 mt-8">
      <div class="w-full h-2 rounded-full overflow-hidden" style="background: var(--card);" id="progress-track">
        <div class="progress-fill h-full rounded-full" id="progress-fill" style="width: 66%;"></div>
      </div>
      <p class="text-xs mt-2" style="color: var(--muted);" id="progress-label">进度 2/3</p>
    </div>

    <!-- Subtask Checklist -->
    <div class="px-5 mt-6 space-y-3" id="subtask-list">
      <!-- Subtask 1: completed -->
      <div class="subtask-card subtask-done flex items-center gap-3 p-4 rounded-xl" style="background: var(--card);" data-done="true">
        <div class="subtask-check w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style="background: var(--success);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <span class="subtask-text text-sm" style="color: var(--muted); text-decoration: line-through;">收集竞品数据</span>
      </div>

      <!-- Subtask 2: completed -->
      <div class="subtask-card subtask-done flex items-center gap-3 p-4 rounded-xl" style="background: var(--card);" data-done="true">
        <div class="subtask-check w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style="background: var(--success);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <span class="subtask-text text-sm" style="color: var(--muted); text-decoration: line-through;">确定方案框架</span>
      </div>

      <!-- Subtask 3: pending -->
      <div class="subtask-card subtask-pending flex items-center gap-3 p-4 rounded-xl" style="background: var(--card);" data-done="false" onclick="toggleSubtask(this)">
        <div class="subtask-check w-6 h-6 rounded-full flex-shrink-0"></div>
        <span class="subtask-text text-sm" style="color: var(--text);">撰写核心内容</span>
      </div>
    </div>

    <!-- Bottom CTA -->
    <div class="px-5 pt-6 pb-8">
      <button class="cta-btn w-full py-4 rounded-full font-semibold text-base" style="background: var(--brand); color: white;" id="complete-btn" onclick="completeTask()">
        完成任务
      </button>
      <p class="text-xs text-center mt-3" style="color: var(--muted);">完成后自动切换到下一个任务</p>
    </div>

    <!-- Gesture Bar -->
    <div class="gesture-bar"></div>

    <!-- Celebration Overlay -->
    <div class="celebration-overlay" id="celebration">
      <div class="relative flex items-center justify-center">
        <div class="check-ring absolute w-24 h-24 rounded-full" style="border: 2px solid var(--success);"></div>
        <div class="check-circle w-20 h-20 rounded-full flex items-center justify-center" style="background: var(--success);">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
      </div>
      <h2 class="celeb-title text-xl font-bold mt-6" style="color: var(--text);">干得漂亮!</h2>
      <p class="celeb-sub text-sm mt-2" style="color: var(--muted);">连续完成 2 个任务</p>
      <button class="celeb-btn mt-8 px-10 py-3 rounded-full font-semibold text-sm" style="background: var(--brand); color: white;" onclick="dismissCelebration()">
        继续
      </button>
    </div>

  </div>

  <script>
    function toggleSubtask(el) {
      const isDone = el.getAttribute('data-done') === 'true';
      const check = el.querySelector('.subtask-check');
      const text = el.querySelector('.subtask-text');

      if (!isDone) {
        el.setAttribute('data-done', 'true');
        el.classList.remove('subtask-pending');
        el.classList.add('subtask-done');
        check.style.background = 'var(--success)';
        check.style.border = 'none';
        check.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        text.style.color = 'var(--muted)';
        text.style.textDecoration = 'line-through';
        el.onclick = null;
      }
      updateProgress();
    }

    function updateProgress() {
      const tasks = document.querySelectorAll('.subtask-card');
      const done = document.querySelectorAll('.subtask-card[data-done="true"]').length;
      const total = tasks.length;
      const pct = Math.round((done / total) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = '进度 ' + done + '/' + total;
    }

    function completeTask() {
      // Mark all pending as done first
      document.querySelectorAll('.subtask-card[data-done="false"]').forEach(function(el) {
        toggleSubtask(el);
      });
      // Show celebration
      document.getElementById('celebration').classList.add('active');
    }

    function dismissCelebration() {
      document.getElementById('celebration').classList.remove('active');
    }
  </script>
</body>
</html>
