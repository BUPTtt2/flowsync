<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FlowSync - 首页</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #d97757;
      --brand-hover: #c46a4c;
      --brand-light: #e08d6f;
      --dark: #1b1b19;
      --dark-mid: #262624;
      --card: #2c2c2b;
      --text: #faf9f5;
      --muted: #b7b5a9;
      --success: #8ca06f;
      --border: #908e84;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app-shell {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Active press effect */
    .pressable:active {
      transform: scale(0.97);
      transition: transform 0.1s ease;
    }

    /* Custom scrollbar hide */
    .app-shell::-webkit-scrollbar { display: none; }
    .app-shell { -ms-overflow-style: none; scrollbar-width: none; }

    /* SVG icon coloring */
    .nav-icon { transition: color 0.2s ease; }
  </style>
</head>
<body>

<div class="app-shell">
  <!-- Status bar spacer -->
  <div style="height: env(safe-area-inset-top, 0px);"></div>

  <!-- Top Area -->
  <div class="px-5 pt-6 flex items-start justify-between">
    <div>
      <p class="text-xl font-bold" style="color: var(--text);">下午好</p>
      <p class="text-sm mt-1" style="color: var(--muted);">今天有 3 个任务等待你</p>
    </div>
    <div class="flex items-center gap-1.5 rounded-full px-3 py-1.5 shrink-0" style="background: var(--card);">
      <span class="w-2 h-2 rounded-full" style="background: var(--brand);"></span>
      <span class="text-xs font-medium" style="color: var(--text);">状态不错</span>
    </div>
  </div>

  <!-- Today's Focus Card -->
  <a href="focus.html" data-dom-id="cta-focus" class="pressable block mx-5 mt-6 rounded-2xl relative overflow-hidden" style="background: var(--card);">
    <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-l-2xl" style="background: var(--brand);"></div>
    <div class="p-5">
      <p class="text-xs font-semibold tracking-wider" style="color: var(--brand);">今日聚焦</p>
      <p class="text-lg font-semibold mt-2" style="color: var(--text);">完成产品方案初稿</p>
      <p class="text-sm mt-1" style="color: var(--brand);">18:00 截止</p>
      <button class="mt-4 px-4 py-2 rounded-full text-sm font-medium pressable" style="background: var(--brand); color: var(--text);" onclick="event.preventDefault();">开始</button>
    </div>
  </a>

  <!-- Upcoming Tasks -->
  <div class="mx-5 mt-6 pb-36">
    <p class="text-sm font-semibold mb-3" style="color: var(--muted);">待处理</p>

    <!-- Task 1 -->
    <div class="pressable flex items-center gap-3 rounded-xl p-4 mb-3" style="background: var(--card);">
      <span class="w-2 h-2 rounded-full shrink-0" style="background: var(--success);"></span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate" style="color: var(--text);">回复客户邮件</p>
        <p class="text-xs mt-0.5" style="color: var(--muted);">明天</p>
      </div>
      <svg class="w-4 h-4 shrink-0" style="color: var(--border);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </div>

    <!-- Task 2 -->
    <div class="pressable flex items-center gap-3 rounded-xl p-4" style="background: var(--card);">
      <span class="w-2 h-2 rounded-full shrink-0" style="background: var(--border);"></span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate" style="color: var(--text);">整理会议笔记</p>
        <p class="text-xs mt-0.5" style="color: var(--muted);">本周</p>
      </div>
      <svg class="w-4 h-4 shrink-0" style="color: var(--border);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </div>
  </div>

  <!-- FAB - Quick Add -->
  <a href="voice-input.html" data-dom-id="cta-voice-input" class="pressable fixed z-40 w-14 h-14 rounded-full flex items-center justify-center shadow-lg" style="background: var(--brand); bottom: calc(64px + env(safe-area-inset-bottom, 16px)); right: max(20px, calc((100vw - 430px) / 2 + 20px));">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color: var(--text);">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/>
    </svg>
  </a>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full z-50" style="max-width: 430px; background: rgba(27,27,25,0.95); backdrop-filter: blur(12px); padding-bottom: env(safe-area-inset-bottom, 8px);">
    <div class="flex items-center justify-around h-14">
      <!-- Home (active) -->
      <a href="home.html" class="flex flex-col items-center gap-0.5 pressable" style="color: var(--brand);">
        <svg class="nav-icon w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="text-[10px] font-medium">首页</span>
      </a>

      <!-- Tasks -->
      <a href="tasks.html" data-dom-id="cta-tasks" class="flex flex-col items-center gap-0.5 pressable" style="color: var(--muted);">
        <svg class="nav-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <span class="text-[10px] font-medium">任务</span>
      </a>

      <!-- Mood -->
      <a href="mood.html" data-dom-id="cta-mood" class="flex flex-col items-center gap-0.5 pressable" style="color: var(--muted);">
        <svg class="nav-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-[10px] font-medium">心情</span>
      </a>

      <!-- Profile -->
      <a href="profile.html" class="flex flex-col items-center gap-0.5 pressable" style="color: var(--muted);">
        <svg class="nav-icon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-[10px] font-medium">我的</span>
      </a>
    </div>

    <!-- Android gesture indicator bar -->
    <div class="flex justify-center pb-1">
      <div class="w-32 h-1 rounded-full" style="background: var(--muted); opacity: 0.4;"></div>
    </div>
  </nav>
</div>

</body>
</html>
